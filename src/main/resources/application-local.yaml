spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

dev:
  allowlist:
    enabled: false
    riotIds:
      - "guny#kr1"
      - "욕설만쳐1#kr1"
      - "lune silencieuse#KR2"
      - "hideonbush#kr1"
